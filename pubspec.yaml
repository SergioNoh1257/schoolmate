name: schoolmate
description: A simple assistant
publish_to: 'none'
version: 1.0.1+0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  http: ^1.1.2
  image_fade: ^0.6.2
  loading_animation_widget: ^1.2.0+4
  marquee: ^2.2.3
  media_kit: ^1.1.10+1
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_linux: ^1.1.3
  media_kit_native_event_loop: ^1.0.8
  media_kit_video: ^1.2.4
  scrollable_positioned_list: ^0.3.8
  statsfl: ^2.3.0
  supabase_flutter: ^2.0.0
  syncfusion_flutter_pdfviewer: ^23.2.7
  toastification: ^1.1.0
  uuid: ^4.2.1
  window_manager: ^0.3.7

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
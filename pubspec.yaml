name: schoolmate
description: A simple assistant
publish_to: 'none'
version: 1.0.2+0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Files
  cross_file: ^0.3.3+8
  file_picker: ^6.1.1
  http: ^1.1.2

  #Image
  image_fade: ^0.6.2
  image_picker: ^1.0.5

  #Stats
  statsfl: ^2.3.0

  #Viewers
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_linux: ^1.1.3
  media_kit_native_event_loop: ^1.0.8
  syncfusion_flutter_pdfviewer: ^23.2.7

  #Administration
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  supabase_flutter: ^2.0.0
  uuid: ^4.2.1
  window_manager: ^0.3.7

  #Widgets
  loading_animation_widget: ^1.2.0+4
  marquee: ^2.2.3
  toastification: ^1.1.0
  scrollable_positioned_list: ^0.3.8
  image_picker_for_web: ^3.0.1

#Overrides
dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/